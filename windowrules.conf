#windowrulev2 = opacity 0.96 0.90,class:^(firefox)$
windowrule {
  name = windowrule-1
  opacity = 1 1
  match:class = ^(Brave-browser)$
}

#windowrulev2 = maximize, class:^(Brave-browser)$
